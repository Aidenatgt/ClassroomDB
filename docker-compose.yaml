services:
  db:
    image: postgres:17
    container_name: classroom-cleaning-postgres
    environment:
      POSTGRES_DB: classroom_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
  adminer:
    image: adminer
    container_name: classroom-maintenance-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
volumes:
  postgres_data:
